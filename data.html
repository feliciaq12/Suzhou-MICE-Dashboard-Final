<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suzhou Event Dashboard - Data</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="data">
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <div class="brand-mark">
          <i data-lucide="map-pinned"></i>
        </div>
        <div>
          <h1>Suzhou Event Dashboard</h1>
          <p>苏州活动数据分析平台</p>
        </div>
      </div>
    </div>
  </header>

  <nav class="topnav">
    <a href="index.html">Home</a>
    <a href="analytics.html">Analytics</a>
    <a href="data.html" class="active">Data</a>
    <a href="graph.html">Knowledge Graph</a>
  </nav>

  <main class="container">
    <section class="card table-card">
      <div class="section-head table-head table-head-stacked">
        <div>
          <h3>Event Data Explorer</h3>
          <p>Search and filter events by venue or sector.</p>
        </div>
        <div class="table-controls">
          <input id="searchInput" type="text" placeholder="Search events..." />
          <select id="venueFilter">
            <option value="">All venues</option>
          </select>
          <select id="sectorFilter">
            <option value="">All sectors</option>
          </select>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Event Name</th>
              <th>Venue</th>
              <th>Sector</th>
              <th>Scope</th>
              <th>Impact</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr>
              <td colspan="5">Loading data...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
